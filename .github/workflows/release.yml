name: Create Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths: ["VERSION"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists. Skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist. Will create release."
          fi

      - name: Sync version into project files
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          chmod +x .github/scripts/update-version.sh
          .github/scripts/update-version.sh "${{ steps.version.outputs.version }}"

      - name: Commit version sync
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nurbid-latest-post-url.php README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync version to ${{ steps.version.outputs.version }}"
            git push
          fi

      - name: Build plugin zip
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_FILE="nurbid-latest-post-url-${VERSION}.zip"
          git archive --format=zip --prefix=nurbid-latest-post-url/ --output "$ZIP_FILE" HEAD

      - name: Create Git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Release v${{ steps.version.outputs.version }}

            See the [full changelog](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}) for details.

            ### Installation
            Download `nurbid-latest-post-url-${{ steps.version.outputs.version }}.zip` from Assets, then install via **Plugins → Add New → Upload Plugin**.
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: nurbid-latest-post-url-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
